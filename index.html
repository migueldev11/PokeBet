<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké-Stakes: Platinum Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --pk-red: #e3350d; --pk-blue: #3164b3; --pk-yellow: #fbd743;
            --dark: #0b0f19; --panel: #1e293b; --glass: rgba(255, 255, 255, 0.05);
            --hp-green: #22c55e; --hp-yellow: #eab308; --hp-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #02040a; color: white; height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #game-container {
            width: 100%; max-width: 480px; height: 100%; background: var(--dark);
            position: relative; display: flex; flex-direction: column; border: 1px solid #1e293b; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .screen { position: absolute; inset: 0; padding: 20px; display: none; flex-direction: column; z-index: 10; background: var(--dark); }
        .active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HUD & UI */
        .hud { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: var(--panel); border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .coin-box { color: var(--pk-yellow); font-weight: 900; letter-spacing: 1px; }

        /* Seleção */
        .pkmn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; padding: 10px 5px; }
        .pkmn-card { background: var(--panel); border-radius: 12px; padding: 10px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .pkmn-card.selected { border-color: var(--pk-yellow); background: #334155; transform: scale(1.05); box-shadow: 0 0 15px rgba(251, 215, 67, 0.2); }
        .pkmn-card img { width: 100%; max-width: 75px; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5)); transition: 0.2s; }
        .pkmn-card.selected img { transform: scale(1.1); }
        .pkmn-card p { font-size: 0.7rem; text-transform: uppercase; font-weight: 800; margin-top: 5px; color: #cbd5e1; }

        /* Arena */
        .arena { 
            flex: 1; position: relative; border-radius: 20px; border: 3px solid #334155; margin-bottom: 15px; overflow: hidden;
            background: radial-gradient(circle at top, #1e40af 0%, #020617 100%); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .sprite { position: absolute; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.6)); }
        .enemy-sprite { top: 15%; right: 5%; width: 140px; }
        .player-sprite { bottom: 5%; left: 5%; width: 170px; }
        
        .hit-effect { animation: flash 0.3s ease; }
        @keyframes flash { 0% { filter: brightness(1) drop-shadow(0 10px 10px rgba(0,0,0,0.6)); } 50% { filter: brightness(5) sepia(1) hue-rotate(-50deg) saturate(5); transform: scale(1.1) rotate(5deg); } 100% { filter: brightness(1) drop-shadow(0 10px 10px rgba(0,0,0,0.6)); } }

        /* HP Bars */
        .hp-box { position: absolute; background: rgba(15, 23, 42, 0.85); padding: 10px; border-radius: 12px; width: 150px; border: 1px solid #475569; z-index: 5; backdrop-filter: blur(4px); }
        .enemy-hp { top: 20px; left: 20px; border-left: 4px solid var(--pk-red); }
        .player-hp { bottom: 120px; right: 20px; border-right: 4px solid var(--pk-blue); }
        .hp-bar { height: 8px; background: #0f172a; border-radius: 4px; margin-top: 6px; overflow: hidden; border: 1px solid #000; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.4s ease, background-color 0.4s ease; background: var(--hp-green); }

        /* Botões */
        .battle-ui { display: flex; flex-direction: column; gap: 8px; }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; color: white; letter-spacing: 0.5px; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-move { background: var(--panel); text-align: left; display: flex; flex-direction: column; font-size: 0.75rem; border: 1px solid #334155; box-shadow: 0 4px 0 #0f172a; }
        .btn-move span { font-size: 0.6rem; color: #94a3b8; margin-top: 3px; }
        .btn-special { background: linear-gradient(135deg, var(--pk-red), #991b1b); box-shadow: 0 4px 0 #7f1d1d; text-align: center; }
        .btn-outline { background: transparent; border: 2px solid var(--pk-blue); color: var(--pk-blue); box-shadow: 0 4px 0 #1e3a8a; text-align: center; }

        #log { height: 70px; background: rgba(0,0,0,0.6); padding: 10px; font-size: 0.8rem; overflow-y: auto; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; color: #f8fafc; font-weight: 500; }
        
        /* Modais */
        .modal-overlay { position: absolute; inset: 0; background: rgba(2,6,23,0.95); z-index: 100; display: none; padding: 20px; flex-direction: column; backdrop-filter: blur(5px); }
        
        #loader { position: fixed; inset: 0; background: #02040a; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #1e293b; border-top-color: var(--pk-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #multi-id-display { background: var(--panel); padding: 15px; border-radius: 12px; font-family: monospace; font-size: 1.5rem; color: var(--pk-yellow); margin: 15px 0; border: 2px dashed var(--pk-yellow); letter-spacing: 2px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1rem; text-align: center; font-weight: bold; margin-bottom: 15px; outline: none; }
        input[type="text"]:focus { border-color: var(--pk-blue); }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-msg" style="margin-top: 20px; color: var(--pk-yellow); font-weight: bold; letter-spacing: 1px;">PREPARANDO ARENA...</p>
</div>

<div id="game-container">
    <section id="screen-home" class="screen active">
        <div class="hud">
            <div class="coin-box">🪙 <span id="h-coins">500</span></div>
            <div style="font-weight: bold; color: #cbd5e1;">RANK <span id="h-lv" style="color: white;">1</span></div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png" style="width: 70px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));">
            <h1 style="font-size: 3.5rem; color: var(--pk-red); text-shadow: 3px 3px var(--pk-blue); line-height: 0.9;">POKÉ<br>STAKES</h1>
            <p style="margin-top: 15px; color: var(--pk-yellow); font-weight: 800; letter-spacing: 2px; font-size: 0.9rem;">PLATINUM ONLINE</p>
        </div>
        <button class="btn btn-special" style="margin-bottom: 15px;" onclick="showSelect(false)">SOLO (CONTRA CPU)</button>
        <button class="btn btn-outline" onclick="showMultiMenu()">MULTIPLAYER 1V1</button>
    </section>

    <section id="screen-multi-menu" class="screen" style="justify-content: center;">
        <h2 style="text-align: center; margin-bottom: 30px; font-size: 1.8rem;">SALA ONLINE</h2>
        <button class="btn btn-special" style="margin-bottom: 30px;" onclick="createRoom()">CRIAR SALA</button>
        <div style="text-align: center; color: #64748b; font-weight: bold; margin-bottom: 30px;">— OU ENTRE EM UMA —</div>
        <input type="text" id="join-id" placeholder="COLE O ID DO AMIGO AQUI">
        <button class="btn btn-outline" style="margin-bottom: 20px;" onclick="joinRoom()">ENTRAR NA SALA</button>
        <button class="btn btn-move" style="text-align: center; margin-top: auto;" onclick="showScreen('screen-home')">VOLTAR</button>
    </section>

    <section id="screen-wait" class="screen" style="justify-content: center; text-align: center;">
        <h2 style="color: var(--hp-green);">SALA CRIADA!</h2>
        <p style="margin-top: 15px; color: #cbd5e1;">Mande este código para seu amigo:</p>
        <div id="multi-id-display">-------</div>
        <div class="spinner" style="margin: 20px auto; width: 30px; height: 30px; border-width: 3px;"></div>
        <p id="wait-status" style="color: var(--pk-yellow);">Aguardando oponente...</p>
    </section>

    <section id="screen-select" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--panel); padding: 15px; border-radius: 12px;">
            <h2 id="select-title" style="font-size: 1.1rem;">MONTE SUA EQUIPE</h2>
            <div id="sel-count" style="color: var(--pk-yellow); font-weight: 900; font-size: 1.2rem;">0/6</div>
        </div>
        <div class="pkmn-grid" id="pkmn-list"></div>
        <button id="btn-confirm" class="btn btn-special" style="margin-top: 15px;" disabled onclick="confirmTeam()">CONFIRMAR EQUIPE</button>
    </section>

    <section id="screen-battle" class="screen">
        <div class="arena">
            <div class="hp-box enemy-hp">
                <div style="font-size: 0.7rem; font-weight: 900; color: #e2e8f0;" id="e-name">---</div>
                <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div></div>
            </div>
            <img id="e-sprite" class="sprite enemy-sprite" src="">
            <img id="p-sprite" class="sprite player-sprite" src="">
            <div class="hp-box player-hp">
                <div style="font-size: 0.7rem; font-weight: 900; color: #e2e8f0;" id="p-name">---</div>
                <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div>
            </div>
        </div>
        <div id="log"></div>
        <div class="battle-ui">
            <div class="move-grid" id="move-cont"></div>
            <div style="display: flex; gap: 8px;">
                <button id="switch-btn" class="btn btn-move" style="flex: 1; text-align: center; justify-content: center;" onclick="openSwitch()">TROCAR</button>
                <button id="mega-btn" class="btn btn-special" style="flex: 1; display: none; box-shadow: 0 0 15px rgba(227, 53, 13, 0.5);" onclick="triggerMega()">MEGA EVOLUIR</button>
            </div>
        </div>
    </section>

    <div id="switch-modal" class="modal-overlay">
        <h2 style="margin-bottom: 20px; color: var(--pk-yellow); text-align: center;">ESCOLHA SEU POKÉMON</h2>
        <div id="switch-list" class="pkmn-grid" style="margin-bottom: 20px;"></div>
        <button class="btn btn-move" style="text-align: center; margin-top: auto;" onclick="closeSwitch()">CANCELAR</button>
    </div>

    <div id="mega-xy-modal" class="modal-overlay" style="justify-content: center;">
        <h2 style="text-align: center; margin-bottom: 20px; color: var(--pk-yellow);">ESCOLHA A MEGA EVOLUÇÃO</h2>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-special" style="flex: 1; background: #1d4ed8; box-shadow: 0 4px 0 #1e3a8a;" onclick="chooseMega('x')">MEGA X</button>
            <button class="btn btn-special" style="flex: 1; background: #c2410c; box-shadow: 0 4px 0 #9a3412;" onclick="chooseMega('y')">MEGA Y</button>
        </div>
        <button class="btn btn-move" style="text-align: center; margin-top: 20px;" onclick="document.getElementById('mega-xy-modal').style.display='none'">CANCELAR</button>
    </div>
</div>
<script>
// --- CONFIGURAÇÕES ---
const ALL_IDS = [...Array.from({length: 251}, (_, i) => i + 1), 493];
const TYPE_CHART = {
    fire: { grass: 2, water: 0.5, ice: 2, fire: 0.5, steel: 2 },
    water: { fire: 2, ground: 2, rock: 2, water: 0.5 },
    grass: { water: 2, ground: 2, fire: 0.5, grass: 0.5, rock: 2 },
    electric: { water: 2, flying: 2, electric: 0.5, ground: 0 },
    psychic: { fighting: 2, poison: 2, psychic: 0.5 }
};

let state = {
    coins: parseInt(localStorage.getItem('ps_coins')) || 500,
    pTeam: [], eTeam: [], pIdx: 0, eIdx: 0,
    selected: [], isMultiplayer: false,
    peer: null, conn: null, myTurn: false, role: null, megaUsed: false
};

// Sistema de Som
function playCry(url) {
    if(url) {
        let audio = new Audio(url);
        audio.volume = 0.4;
        audio.play().catch(e => console.log("Áudio bloqueado pelo navegador até o primeiro clique."));
    }
}

// --- SISTEMA DE TELAS ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showSelect(multi) {
    state.isMultiplayer = multi;
    document.getElementById('select-title').innerText = multi ? "EQUIPE ONLINE (1v1)" : "EQUIPE SOLO";
    showScreen('screen-select');
}

function showMultiMenu() { showScreen('screen-multi-menu'); } // Corrigido o bug do botão!

// --- MULTIPLAYER P2P ---
function createRoom() {
    state.peer = new Peer();
    state.peer.on('open', id => {
        document.getElementById('multi-id-display').innerText = id;
        showScreen('screen-wait');
        state.role = 'host';
    });
    state.peer.on('connection', c => { state.conn = c; setupConn(); });
}

function joinRoom() {
    const id = document.getElementById('join-id').value.trim();
    if(!id) return alert("Cole o ID do amigo primeiro!");
    state.peer = new Peer();
    state.peer.on('open', () => {
        state.conn = state.peer.connect(id);
        state.role = 'guest';
        setupConn();
    });
}

function setupConn() {
    state.conn.on('open', () => {
        showSelect(true);
        state.conn.on('data', data => handleNetworkData(data));
    });
}

// --- LÓGICA DE DADOS ---
function init() {
    const list = document.getElementById('pkmn-list');
    ALL_IDS.forEach(id => {
        const d = document.createElement('div');
        d.className = 'pkmn-card';
        d.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png"><p>#${id}</p>`;
        d.onclick = () => {
            if(state.selected.includes(id)) {
                state.selected = state.selected.filter(i => i !== id);
                d.classList.remove('selected');
            } else if(state.selected.length < 6) {
                state.selected.push(id);
                d.classList.add('selected');
            }
            document.getElementById('sel-count').innerText = `${state.selected.length}/6`;
            document.getElementById('btn-confirm').disabled = state.selected.length !== 6;
        };
        list.appendChild(d);
    });
}

async function fetchPkmn(id) {
    try {
        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const d = await r.json();
        return {
            name: d.name, type: d.types[0].type.name,
            hp: d.stats[0].base_stat * 2.5 + 115, maxHp: d.stats[0].base_stat * 2.5 + 115,
            atk: d.stats[1].base_stat, def: d.stats[2].base_stat, spd: d.stats[5].base_stat, 
            bst: d.stats.reduce((a,b) => a + b.base_stat, 0),
            sprite: d.sprites.other['official-artwork'].front_default || d.sprites.front_default,
            cry: d.cries ? d.cries.latest : null, // Puxa o som oficial!
            moves: d.moves.slice(0,15).map(m => ({ 
                name: m.move.name.replace(/-/g,' '), pwr: 65, type: d.types[0].type.name 
            })).sort(() => 0.5 - Math.random()).slice(0,4),
            isMega: false
        };
    } catch(e) { return null; }
}

async function confirmTeam() {
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('loader-msg').innerText = "CAPTURANDO DADOS...";
    state.pTeam = await Promise.all(state.selected.map(id => fetchPkmn(id)));
    if(state.isMultiplayer) {
        state.conn.send({ type: 'TEAM_READY', team: state.pTeam });
        document.getElementById('loader-msg').innerText = "AGUARDANDO OPONENTE...";
    } else {
        const eIds = Array.from({length: 6}, () => ALL_IDS[Math.floor(Math.random()*ALL_IDS.length)]);
        state.eTeam = await Promise.all(eIds.map(id => fetchPkmn(id)));
        startBattle();
    }
}

function handleNetworkData(data) {
    if(data.type === 'TEAM_READY') { state.eTeam = data.team; startBattle(); }
    if(data.type === 'ATTACK') executeNetworkAttack(data.move);
    if(data.type === 'MEGA') executeNetworkMega(data.sprite);
    if(data.type === 'SWITCH') executeNetworkSwitch(data.idx);
}

function startBattle() {
    state.pIdx = 0; state.eIdx = 0; state.megaUsed = false;
    state.myTurn = (state.role === 'host' || !state.isMultiplayer);
    showScreen('screen-battle');
    document.getElementById('loader').style.display = 'none';
    renderTurn();
    playCry(state.pTeam[state.pIdx].cry); // Toca o som do primeiro Pokémon
}

function renderTurn() {
    const p = state.pTeam[state.pIdx], e = state.eTeam[state.eIdx];
    document.getElementById('p-name').innerText = p.name.toUpperCase();
    document.getElementById('p-sprite').src = p.sprite;
    document.getElementById('e-name').innerText = e.name.toUpperCase();
    document.getElementById('e-sprite').src = e.sprite;
    updateBars();

    const cont = document.getElementById('move-cont');
    cont.innerHTML = '';
    p.moves.forEach(m => {
        const b = document.createElement('button');
        b.className = 'btn btn-move';
        b.disabled = !state.myTurn;
        b.innerHTML = `<b style="font-size: 0.8rem;">${m.name.toUpperCase()}</b><span>TIPO: ${m.type.toUpperCase()}</span>`;
        b.onclick = () => processAttack(m);
        cont.appendChild(b);
    });

    // Se o inimigo cair, não deixa atacar
    if(e.hp <= 0 || p.hp <= 0) toggleBtns(false);

    document.getElementById('mega-btn').style.display = (p.bst > 450 && !state.megaUsed && !p.isMega) ? 'block' : 'none';
    document.getElementById('switch-btn').disabled = !state.myTurn;
}

// --- SISTEMA DE TROCA (CORRIGIDO) ---
function openSwitch() {
    if(!state.myTurn && state.isMultiplayer) return; // Não troca fora do turno online
    const list = document.getElementById('switch-list');
    list.innerHTML = '';
    state.pTeam.forEach((p, i) => {
        const d = document.createElement('div');
        d.className = 'pkmn-card';
        d.style.opacity = p.hp <= 0 ? '0.4' : '1';
        d.innerHTML = `<img src="${p.sprite}"><p>${p.name}</p>
                       <div style="background:#0f172a; border-radius:4px; margin-top:5px; height:6px; width:100%;">
                         <div style="background:var(--hp-green); height:100%; width:${(p.hp/p.maxHp)*100}%"></div>
                       </div>`;
        if(p.hp > 0 && i !== state.pIdx) {
            d.onclick = () => { 
                state.pIdx = i; 
                closeSwitch(); 
                addLog(`Vai! ${p.name.toUpperCase()}!`);
                if(state.isMultiplayer) {
                    state.conn.send({ type: 'SWITCH', idx: i });
                    state.myTurn = false; // Perde o turno ao trocar
                } else {
                    setTimeout(botTurn, 800); // Bot ataca se vc trocar no offline
                }
                renderTurn();
                playCry(p.cry);
            };
        }
        list.appendChild(d);
    });
    document.getElementById('switch-modal').style.display = 'flex';
}

function closeSwitch() { document.getElementById('switch-modal').style.display = 'none'; }

function executeNetworkSwitch(idx) {
    state.eIdx = idx;
    addLog(`Oponente trocou para ${state.eTeam[idx].name.toUpperCase()}!`);
    state.myTurn = true;
    renderTurn();
    playCry(state.eTeam[idx].cry);
}

// --- MEGA EVOLUÇÃO (COM X E Y) ---
let pendingMega = null;
function triggerMega() {
    const p = state.pTeam[state.pIdx];
    if(p.name === 'charizard' || p.name === 'mewtwo') {
        pendingMega = p;
        document.getElementById('mega-xy-modal').style.display = 'flex';
    } else {
        processMega(p, "");
    }
}

function chooseMega(type) {
    document.getElementById('mega-xy-modal').style.display = 'none';
    processMega(pendingMega, "-" + type);
}

async function processMega(p, suffix) {
    addLog(`${p.name.toUpperCase()} reagiu à Mega Stone!`);
    const img = document.getElementById('p-sprite');
    img.style.filter = 'brightness(5) contrast(2)';
    playCry(p.cry);
    
    try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.name.toLowerCase()}-mega${suffix}`);
        if(res.ok) {
            const d = await res.json();
            p.sprite = d.sprites.other['official-artwork'].front_default;
        }
    } catch(e) { console.log("Mega form visual not found."); }

    p.atk *= 1.6; p.name = "MEGA " + p.name + (suffix ? suffix.toUpperCase() : ""); 
    p.isMega = true; state.megaUsed = true;
    
    if(state.isMultiplayer) state.conn.send({ type: 'MEGA', sprite: p.sprite });

    await new Promise(r => setTimeout(r, 800));
    img.style.filter = 'none';
    renderTurn();
}

function executeNetworkMega(spriteUrl) {
    const e = state.eTeam[state.eIdx];
    addLog(`Oponente mega evoluiu!`);
    e.sprite = spriteUrl;
    e.atk *= 1.6; e.name = "MEGA " + e.name;
    renderTurn();
    playCry(e.cry);
}

// --- COMBATE ---
async function playMoveAnim(type, side) {
    const target = document.getElementById(side + '-sprite');
    const colors = { fire: '#ff4d00', water: '#00ccff', grass: '#00ff66', electric: '#ffff00', psychic: '#ff00ff' };
    const color = colors[type] || '#ffffff';
    target.style.transition = '0.1s';
    for(let i=0; i<4; i++) {
        target.style.transform = `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
        target.style.filter = `drop-shadow(0 0 15px ${color}) brightness(1.5)`;
        await new Promise(r => setTimeout(r, 60));
    }
    target.style.transform = 'translate(0,0)';
    target.style.filter = 'none';
}

async function processAttack(move) {
    if(!state.myTurn) return;
    state.myTurn = false;
    toggleBtns(false);
    if(state.isMultiplayer) state.conn.send({ type: 'ATTACK', move: move });

    await hitAction(move, state.pTeam[state.pIdx], state.eTeam[state.eIdx], 'e');
    
    if(!state.isMultiplayer && state.eTeam[state.eIdx].hp > 0) {
        setTimeout(botTurn, 1000);
    }
    checkStatus();
}

async function hitAction(move, atk, def, side) {
    addLog(`${atk.name.toUpperCase()} usou ${move.name.toUpperCase()}!`);
    await playMoveAnim(move.type, side);
    
    let mult = 1;
    if(TYPE_CHART[move.type]?.[def.type]) mult = TYPE_CHART[move.type][def.type];
    
    const dmg = Math.floor((move.pwr * (atk.atk / def.def) * mult) / 4.5);
    def.hp -= dmg; if(def.hp < 0) def.hp = 0;
    
    if(mult > 1) addLog("<span style='color:var(--pk-yellow)'>É super efetivo!</span>");
    if(mult < 1) addLog("<span style='color:#94a3b8'>Não é muito efetivo...</span>");
    updateBars();
}

async function botTurn() {
    const e = state.eTeam[state.eIdx];
    const move = e.moves[Math.floor(Math.random()*e.moves.length)];
    await hitAction(move, e, state.pTeam[state.pIdx], 'p');
    state.myTurn = true;
    checkStatus();
    renderTurn(); // re-enable buttons
}

async function executeNetworkAttack(move) {
    await hitAction(move, state.eTeam[state.eIdx], state.pTeam[state.pIdx], 'p');
    state.myTurn = true;
    checkStatus();
    renderTurn();
}

function checkStatus() {
    if(state.eTeam[state.eIdx].hp <= 0) {
        state.eIdx++;
        if(state.eIdx >= 6) return endBattle(true);
        addLog("Inimigo caiu! Próximo oponente...");
        if(state.isMultiplayer) state.myTurn = false; // Se matou no online, espera ele trocar
        renderTurn();
        if(!state.isMultiplayer) playCry(state.eTeam[state.eIdx].cry);
    } else if(state.pTeam[state.pIdx].hp <= 0) {
        state.pIdx++;
        if(state.pIdx >= 6) return endBattle(false);
        addLog("Seu Pokémon desmaiou!");
        openSwitch();
    }
}

function endBattle(win) {
    alert(win ? "VITÓRIA SUPREMA!" : "VOCÊ FOI DERROTADO!");
    location.reload();
}

function updateBars() {
    const p = state.pTeam[state.pIdx], e = state.eTeam[state.eIdx];
    const pFill = document.getElementById('p-hp-fill');
    const eFill = document.getElementById('e-hp-fill');
    const pPct = (p.hp/p.maxHp)*100;
    const ePct = (e.hp/e.maxHp)*100;
    
    pFill.style.width = pPct + '%';
    pFill.style.backgroundColor = pPct > 50 ? 'var(--hp-green)' : pPct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
    eFill.style.width = ePct + '%';
    eFill.style.backgroundColor = ePct > 50 ? 'var(--hp-green)' : ePct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
}

function addLog(m) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>> ${m}</div>`;
    l.scrollTop = l.scrollHeight;
}
function toggleBtns(on) { document.querySelectorAll('.btn-move').forEach(b => b.disabled = !on); }

init();
</script>
</body>
</html>
