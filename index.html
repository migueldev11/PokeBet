<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poké-Stakes: Platinum Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --pk-red: #ff1f1f; --pk-blue: #3b4cca; --pk-yellow: #ffde00;
            --dark: #0f172a; --glass: rgba(255, 255, 255, 0.1);
            --hp-green: #22c55e; --hp-yellow: #eab308; --hp-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: white; height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #game-container {
            width: 100%; max-width: 480px; height: 100%; background: var(--dark);
            position: relative; display: flex; flex-direction: column; border: 1px solid #1e293b;
        }

        .screen { position: absolute; inset: 0; padding: 20px; display: none; flex-direction: column; z-index: 10; background: var(--dark); }
        .active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HUD */
        .hud { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--glass); border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .coin-box { color: var(--pk-yellow); font-weight: 800; }

        /* Seleção */
        .pkmn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; padding: 10px 5px; }
        .pkmn-card { background: #1e293b; border-radius: 12px; padding: 10px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.2s; position: relative; }
        .pkmn-card.selected { border-color: var(--pk-yellow); background: #334155; transform: scale(1.05); }
        .pkmn-card img { width: 100%; max-width: 70px; }
        .pkmn-card p { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; margin-top: 5px; color: #cbd5e1; }

        /* Arena */
        .arena { 
            flex: 1; position: relative; border-radius: 20px; border: 2px solid #334155; margin-bottom: 15px; overflow: hidden;
            background: linear-gradient(to bottom, #1e40af 0%, #1e1b4b 100%); 
        }
        .sprite { position: absolute; transition: 0.4s ease; z-index: 2; width: 130px; }
        .enemy-sprite { top: 20%; right: 10%; }
        .player-sprite { bottom: 8%; left: 8%; width: 160px; }
        
        .hit-effect { animation: flash 0.2s 2; }
        @keyframes flash { 0% { filter: brightness(1); } 50% { filter: brightness(10) sepia(1) saturate(20) hue-rotate(-50deg); } 100% { filter: brightness(1); } }

        /* HP Bars */
        .hp-box { position: absolute; background: rgba(15, 23, 42, 0.9); padding: 8px; border-radius: 10px; width: 140px; border: 1px solid #475569; z-index: 5; }
        .enemy-hp { top: 20px; left: 20px; border-left: 4px solid var(--pk-red); }
        .player-hp { bottom: 130px; right: 20px; border-right: 4px solid var(--pk-blue); }

        .hp-bar { height: 6px; background: #334155; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.5s ease; background: var(--hp-green); }

        /* Botões */
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; color: white; margin-bottom: 5px; }
        .btn-move { background: #334155; text-align: left; display: flex; flex-direction: column; font-size: 0.7rem; }
        .btn-special { background: var(--pk-red); box-shadow: 0 4px 0 #991b1b; }
        .btn-outline { background: transparent; border: 2px solid #475569; }

        #log { height: 65px; background: rgba(0,0,0,0.5); padding: 8px; font-size: 0.75rem; overflow-y: auto; border-radius: 10px; margin-bottom: 8px; border: 1px solid #334155; color: #e2e8f0; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #020617; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #1e293b; border-top-color: var(--pk-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #multi-id-display { background: #1e293b; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 1.2rem; color: var(--pk-yellow); margin: 10px 0; border: 1px dashed var(--pk-yellow); }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-msg" style="margin-top: 15px; color: var(--pk-yellow); font-weight: bold;">PREPARANDO ARENA...</p>
</div>

<div id="game-container">
    <section id="screen-home" class="screen active">
        <div class="hud">
            <div class="coin-box">🪙 <span id="h-coins">500</span></div>
            <div>RANK <span id="h-lv">1</span></div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
            <h1 style="font-size: 3rem; color: var(--pk-red); text-shadow: 2px 2px var(--pk-blue);">POKÉ<br>STAKES</h1>
            <p style="opacity: 0.5;">MULTPLAYER P2P ONLINE</p>
        </div>
        <button class="btn btn-special" onclick="showSelect(false)">SOLO (CONTRA BOT)</button>
        <button class="btn btn-outline" onclick="showMultiMenu()">MULTIPLAYER 1V1</button>
    </section>

    <section id="screen-multi-menu" class="screen" style="justify-content: center;">
        <h2 style="text-align: center; margin-bottom: 20px;">MODO ONLINE</h2>
        <button class="btn btn-special" onclick="createRoom()">CRIAR SALA</button>
        <div style="margin: 20px 0; text-align: center; opacity: 0.5;">— OU —</div>
        <input type="text" id="join-id" placeholder="ID DO AMIGO" style="padding: 15px; border-radius: 10px; border: none; margin-bottom: 10px; text-align: center;">
        <button class="btn btn-outline" onclick="joinRoom()">ENTRAR NA SALA</button>
        <button class="btn btn-move" style="margin-top: 20px; align-items: center;" onclick="showScreen('screen-home')">VOLTAR</button>
    </section>

    <section id="screen-wait" class="screen" style="justify-content: center; text-align: center;">
        <h2>SALA CRIADA!</h2>
        <p style="margin-top: 10px; opacity: 0.7;">Envie este ID para seu amigo:</p>
        <div id="multi-id-display">-------</div>
        <p id="wait-status">Aguardando oponente entrar...</p>
    </section>

    <section id="screen-select" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 id="select-title">SUA EQUIPE</h2>
            <div id="sel-count" style="color: var(--pk-yellow); font-weight: bold;">0/6</div>
        </div>
        <div class="pkmn-grid" id="pkmn-list"></div>
        <button id="btn-confirm" class="btn btn-special" disabled onclick="confirmTeam()">PRONTO!</button>
    </section>

    <section id="screen-battle" class="screen">
        <div class="arena">
            <div class="hp-box enemy-hp">
                <div style="font-size: 0.65rem; font-weight: bold;" id="e-name">---</div>
                <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div></div>
            </div>
            <img id="e-sprite" class="sprite enemy-sprite" src="">
            <img id="p-sprite" class="sprite player-sprite" src="">
            <div class="hp-box player-hp">
                <div style="font-size: 0.65rem; font-weight: bold;" id="p-name">---</div>
                <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div>
            </div>
        </div>
        <div id="log"></div>
        <div class="battle-ui">
            <div class="move-grid" id="move-cont"></div>
            <div style="display: flex; gap: 5px;">
                <button id="switch-btn" class="btn btn-move" style="flex: 1; align-items: center;" onclick="openSwitch()">TROCAR</button>
                <button id="mega-btn" class="btn btn-special" style="flex: 1; display: none;" onclick="triggerMega()">MEGA</button>
            </div>
        </div>
    </section>

    <div id="switch-modal" style="display: none; position: absolute; inset: 0; background: rgba(2,6,23,0.95); z-index: 100; padding: 20px;">
        <h2 style="margin-bottom: 15px;">TROCAR POKÉMON</h2>
        <div id="switch-list" class="pkmn-grid"></div>
        <button class="btn btn-move" style="margin-top: 10px; width: 100%; align-items: center;" onclick="closeSwitch()">CANCELAR</button>
    </div>
</div>
<script>
// --- CONFIGURAÇÕES ---
const ALL_IDS = [...Array.from({length: 251}, (_, i) => i + 1), 493];
const TYPE_CHART = {
    fire: { grass: 2, water: 0.5, ice: 2, fire: 0.5, steel: 2 },
    water: { fire: 2, ground: 2, rock: 2, water: 0.5 },
    grass: { water: 2, ground: 2, fire: 0.5, grass: 0.5, rock: 2 },
    electric: { water: 2, flying: 2, electric: 0.5, ground: 0 },
    psychic: { fighting: 2, poison: 2, psychic: 0.5 }
};

let state = {
    coins: parseInt(localStorage.getItem('ps_coins')) || 500,
    pTeam: [], eTeam: [], pIdx: 0, eIdx: 0,
    selected: [], isMultiplayer: false,
    peer: null, conn: null, myTurn: false, role: null, megaUsed: false
};

// --- SISTEMA DE TELAS E MULTIPLAYER ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showSelect(multi) {
    state.isMultiplayer = multi;
    showScreen('screen-select');
}

function createRoom() {
    state.peer = new Peer();
    state.peer.on('open', id => {
        document.getElementById('multi-id-display').innerText = id;
        showScreen('screen-wait');
        state.role = 'host';
    });
    state.peer.on('connection', c => { state.conn = c; setupConn(); });
}

function joinRoom() {
    const id = document.getElementById('join-id').value;
    if(!id) return alert("Cole o ID!");
    state.peer = new Peer();
    state.peer.on('open', () => {
        state.conn = state.peer.connect(id);
        state.role = 'guest';
        setupConn();
    });
}

function setupConn() {
    state.conn.on('open', () => {
        showSelect(true);
        state.conn.on('data', data => handleNetworkData(data));
    });
}

// --- LOGICA DE DADOS ---
function init() {
    const list = document.getElementById('pkmn-list');
    ALL_IDS.forEach(id => {
        const d = document.createElement('div');
        d.className = 'pkmn-card';
        d.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png"><p>#${id}</p>`;
        d.onclick = () => {
            if(state.selected.includes(id)) {
                state.selected = state.selected.filter(i => i !== id);
                d.classList.remove('selected');
            } else if(state.selected.length < 6) {
                state.selected.push(id);
                d.classList.add('selected');
            }
            document.getElementById('sel-count').innerText = `${state.selected.length}/6`;
            document.getElementById('btn-confirm').disabled = state.selected.length !== 6;
        };
        list.appendChild(d);
    });
}

async function fetchPkmn(id) {
    try {
        const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const d = await r.json();
        return {
            name: d.name, type: d.types[0].type.name,
            hp: d.stats[0].base_stat * 2.5 + 115, maxHp: d.stats[0].base_stat * 2.5 + 115,
            atk: d.stats[1].base_stat, def: d.stats[2].base_stat,
            spd: d.stats[5].base_stat, bst: d.stats.reduce((a,b) => a + b.base_stat, 0),
            sprite: d.sprites.other['official-artwork'].front_default || d.sprites.front_default,
            moves: d.moves.slice(0,15).map(m => ({ 
                name: m.move.name.replace(/-/g,' '), 
                pwr: 65, 
                type: d.types[0].type.name 
            })).sort(() => 0.5 - Math.random()).slice(0,4),
            isMega: false
        };
    } catch(e) { return null; }
}

async function confirmTeam() {
    document.getElementById('loader').style.display = 'flex';
    state.pTeam = await Promise.all(state.selected.map(id => fetchPkmn(id)));
    if(state.isMultiplayer) {
        state.conn.send({ type: 'TEAM_READY', team: state.pTeam });
    } else {
        const eIds = Array.from({length: 6}, () => ALL_IDS[Math.floor(Math.random()*ALL_IDS.length)]);
        state.eTeam = await Promise.all(eIds.map(id => fetchPkmn(id)));
        startBattle();
    }
}

function handleNetworkData(data) {
    if(data.type === 'TEAM_READY') { state.eTeam = data.team; startBattle(); }
    if(data.type === 'ATTACK') executeNetworkAttack(data.move);
    if(data.type === 'MEGA') executeNetworkMega();
}

function startBattle() {
    state.pIdx = 0; state.eIdx = 0; state.megaUsed = false;
    state.myTurn = (state.role === 'host' || !state.isMultiplayer);
    showScreen('screen-battle');
    document.getElementById('loader').style.display = 'none';
    renderTurn();
}

function renderTurn() {
    const p = state.pTeam[state.pIdx], e = state.eTeam[state.eIdx];
    document.getElementById('p-name').innerText = p.name.toUpperCase();
    document.getElementById('p-sprite').src = p.sprite;
    document.getElementById('e-name').innerText = e.name.toUpperCase();
    document.getElementById('e-sprite').src = e.sprite;
    updateBars();

    const cont = document.getElementById('move-cont');
    cont.innerHTML = '';
    p.moves.forEach(m => {
        const b = document.createElement('button');
        b.className = 'btn btn-move';
        b.disabled = !state.myTurn;
        b.innerHTML = `<b>${m.name.toUpperCase()}</b><span>TIPO: ${m.type.toUpperCase()}</span>`;
        b.onclick = () => processAttack(m);
        cont.appendChild(b);
    });

    document.getElementById('mega-btn').style.display = (p.bst > 450 && !state.megaUsed && !p.isMega) ? 'block' : 'none';
}

// --- ANIMAÇÕES DE GOLPE ---
async function playMoveAnim(type, side) {
    const target = document.getElementById(side + '-sprite');
    const colors = { fire: '#ff4d00', water: '#00ccff', grass: '#00ff66', electric: '#ffff00', psychic: '#ff00ff' };
    const color = colors[type] || '#ffffff';
    
    // Tremer tela
    target.style.transition = '0.1s';
    for(let i=0; i<4; i++) {
        target.style.transform = `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
        target.style.filter = `drop-shadow(0 0 10px ${color}) brightness(2)`;
        await new Promise(r => setTimeout(r, 50));
    }
    target.style.transform = 'translate(0,0)';
    target.style.filter = 'none';
}

async function processAttack(move) {
    if(!state.myTurn) return;
    state.myTurn = false;
    toggleBtns(false);

    if(state.isMultiplayer) state.conn.send({ type: 'ATTACK', move: move });

    await hitAction(move, state.pTeam[state.pIdx], state.eTeam[state.eIdx], 'e');
    
    if(!state.isMultiplayer && state.eTeam[state.eIdx].hp > 0) {
        setTimeout(botTurn, 1000);
    }
    checkStatus();
}

async function hitAction(move, atk, def, side) {
    addLog(`${atk.name.toUpperCase()} usou ${move.name.toUpperCase()}!`);
    await playMoveAnim(move.type, side);
    
    let mult = 1;
    if(TYPE_CHART[move.type]?.[def.type]) mult = TYPE_CHART[move.type][def.type];
    
    const dmg = Math.floor((move.pwr * (atk.atk / def.def) * mult) / 4.5);
    def.hp -= dmg; if(def.hp < 0) def.hp = 0;
    
    if(mult > 1) addLog("É super efetivo!");
    updateBars();
}

async function triggerMega() {
    const p = state.pTeam[state.pIdx];
    addLog(`${p.name.toUpperCase()} está mega evoluindo!`);
    
    const img = document.getElementById('p-sprite');
    img.style.filter = 'brightness(5) contrast(2)';
    
    try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.name.toLowerCase()}-mega`);
        if(res.ok) {
            const d = await res.json();
            p.sprite = d.sprites.other['official-artwork'].front_default;
        }
    } catch(e) {}

    p.atk *= 1.6; p.name = "MEGA " + p.name; p.isMega = true; state.megaUsed = true;
    if(state.isMultiplayer) state.conn.send({ type: 'MEGA' });

    await new Promise(r => setTimeout(r, 800));
    img.style.filter = 'none';
    renderTurn();
}

async function executeNetworkMega() {
    const e = state.eTeam[state.eIdx];
    addLog(`Oponente mega evoluiu ${e.name}!`);
    e.atk *= 1.6; e.name = "MEGA " + e.name;
    renderTurn();
}

async function botTurn() {
    const e = state.eTeam[state.eIdx];
    const move = e.moves[Math.floor(Math.random()*4)];
    await hitAction(move, e, state.pTeam[state.pIdx], 'p');
    state.myTurn = true;
    toggleBtns(true);
    checkStatus();
}

async function executeNetworkAttack(move) {
    await hitAction(move, state.eTeam[state.eIdx], state.pTeam[state.pIdx], 'p');
    state.myTurn = true;
    toggleBtns(true);
    checkStatus();
}

function checkStatus() {
    if(state.eTeam[state.eIdx].hp <= 0) {
        state.eIdx++;
        if(state.eIdx >= 6) return endBattle(true);
        addLog("Próximo oponente!");
        renderTurn();
    } else if(state.pTeam[state.pIdx].hp <= 0) {
        state.pIdx++;
        if(state.pIdx >= 6) return endBattle(false);
        openSwitch();
    }
}

function endBattle(win) {
    alert(win ? "VOCÊ VENCEU A LIGA!" : "VOCÊ FOI DERROTADO!");
    location.reload();
}

function updateBars() {
    const p = state.pTeam[state.pIdx], e = state.eTeam[state.eIdx];
    document.getElementById('p-hp-fill').style.width = (p.hp/p.maxHp)*100 + '%';
    document.getElementById('e-hp-fill').style.width = (e.hp/e.maxHp)*100 + '%';
}

function addLog(m) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>> ${m}</div>`;
    l.scrollTop = l.scrollHeight;
}

function toggleBtns(on) { 
    document.querySelectorAll('.btn-move').forEach(b => b.disabled = !on); 
}
function updateHUD() { document.getElementById('h-coins').innerText = state.coins; }
function openSwitch() { document.getElementById('switch-modal').style.display = 'block'; }
function closeSwitch() { document.getElementById('switch-modal').style.display = 'none'; }

init();
</script>
</body>
</html>
